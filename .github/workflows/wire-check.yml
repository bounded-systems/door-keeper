name: wire-check
# Daemon-side wire conformance: keeperd's METHODS must match the published
# keeper-wire agreement. door-keeper's flake checks are otherwise darwin-only and
# never run in CI — this runs the Linux-scoped conformance check on every PR.
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  keeper-wire-methods:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: DeterminateSystems/nix-installer-action@1d87d45818068401a10cf16bdc5f00b24994a83f # main
      - uses: DeterminateSystems/flakehub-cache-action@4d48cd3cda2f381a3006ff800e1c1ca0c9809159 # v3.21.1
      - name: keeperd METHODS conform to keeper-wire
        run: nix build --print-build-logs '.#checks.x86_64-linux.keeper-wire-methods'
